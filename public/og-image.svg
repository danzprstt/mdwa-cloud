<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#131720"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f6ef7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Glow circles -->
  <circle cx="200" cy="200" r="200" fill="#4f6ef7" opacity="0.06"/>
  <circle cx="1000" cy="430" r="200" fill="#8b5cf6" opacity="0.06"/>
  <!-- Logo icon -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="url(#grad1)"/>
  <text x="120" y="134" font-family="Arial" font-size="40" fill="white" text-anchor="middle">☁</text>
  <!-- Title -->
  <text x="80" y="260" font-family="Arial Black, Arial" font-size="72" font-weight="900" fill="white">MDWA Cloud</text>
  <!-- Subtitle -->
  <text x="80" y="320" font-family="Arial" font-size="32" fill="#94a3b8">Private Cloud Storage &amp; Tools</text>
  <!-- Description -->
  <text x="80" y="400" font-family="Arial" font-size="26" fill="#64748b">Simpan, kelola, dan bagikan file dengan aman.</text>
  <text x="80" y="440" font-family="Arial" font-size="26" fill="#64748b">Dilengkapi downloader, QR generator, dan masih banyak lagi.</text>
  <!-- Tags -->
  <rect x="80" y="510" width="160" height="44" rx="22" fill="url(#grad1)" opacity="0.2"/>
  <text x="160" y="537" font-family="Arial" font-size="20" fill="#4f6ef7" text-anchor="middle" font-weight="700">Cloud Storage</text>
  <rect x="260" y="510" width="160" height="44" rx="22" fill="url(#grad2)" opacity="0.2"/>
  <text x="340" y="537" font-family="Arial" font-size="20" fill="#8b5cf6" text-anchor="middle" font-weight="700">Downloader</text>
  <rect x="440" y="510" width="120" height="44" rx="22" fill="#10b981" opacity="0.15"/>
  <text x="500" y="537" font-family="Arial" font-size="20" fill="#10b981" text-anchor="middle" font-weight="700">Tools</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="Arial" font-size="22" fill="#334155" text-anchor="end">mdwa-clouds.vercel.app</text>
</svg>
